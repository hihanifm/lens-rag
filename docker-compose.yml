services:

  lens-postgres:
    image: pgvector/pgvector:pg16
    container_name: lens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lens
      POSTGRES_USER: lens_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - lens-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lens_user -d lens"]
      interval: 5s
      timeout: 5s
      retries: 5

  lens-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lens-api
    restart: unless-stopped
    ports:
      - "37000:8000"
    depends_on:
      lens-postgres:
        condition: service_healthy
    environment:
      DB_HOST: lens-postgres
      DB_PORT: 5432
      DB_NAME: lens
      DB_USER: lens_user
      DB_PASSWORD: changeme
      # Embedding: "ollama" (default) or "openai"
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      EMBEDDING_DIMS: ${EMBEDDING_DIMS:-1024}
      # Reranker: always Ollama, set to "false" to skip
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_MODEL: ${RERANKER_MODEL:-bge-reranker-base}
    volumes:
      - lens-uploads:/data/projects
    extra_hosts:
      - "host.docker.internal:host-gateway"  # reach Ollama on host

volumes:
  lens-postgres-data:
  lens-uploads:
