services:

  lens-rag-postgres:
    profiles: ["dev"]
    image: pgvector/pgvector:pg16
    container_name: lens-rag-postgres
    restart: always
    environment:
      POSTGRES_DB: lens
      POSTGRES_USER: lens_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - lens-rag-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lens_user -d lens"]
      interval: 5s
      timeout: 5s
      retries: 5

  lens-rag-postgres-prod:
    profiles: ["prod"]
    image: pgvector/pgvector:pg16
    container_name: lens-rag-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: lens
      POSTGRES_USER: lens_user
      POSTGRES_PASSWORD: changeme
    volumes:
      - lens-rag-postgres-prod-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lens_user -d lens"]
      interval: 5s
      timeout: 5s
      retries: 5

  lens-rag-api:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: lens-rag-api
    restart: unless-stopped
    ports:
      - "37002:8000"
    depends_on:
      lens-rag-postgres:
        condition: service_healthy
    environment:
      DB_HOST: lens-rag-postgres
      DB_PORT: 5432
      DB_NAME: lens
      DB_USER: lens_user
      DB_PASSWORD: changeme
      # Embedding: "ollama" (default) or "openai"
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      EMBEDDING_DIMS: ${EMBEDDING_DIMS:-1024}
      PGVECTOR_MAX_INDEXED_DIMS: ${PGVECTOR_MAX_INDEXED_DIMS:-2000}
      # Reranker: always Ollama, set to "false" to skip
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_MODEL: ${RERANKER_MODEL:-bbjson/bge-reranker-base:latest}
    volumes:
      - lens-rag-uploads:/data/projects
    extra_hosts:
      - "host.docker.internal:host-gateway"  # reach Ollama on host

  lens-rag-frontend:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
      args:
        NODE_IMAGE: ${NODE_IMAGE:-public.ecr.aws/docker/library/node:20-bookworm-slim}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: lens-rag-frontend
    restart: unless-stopped
    ports:
      - "37001:37001"
    environment:
      # Vite proxy forwards API calls to the backend over the internal Docker network.
      # The browser only ever talks to the Vite server — port 37002 need not be reachable.
      - VITE_API_PROXY_TARGET=http://lens-rag-api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - lens-rag-api

  lens-rag-api-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: lens-rag-api-prod
    restart: always
    ports:
      - "37000:8000"
    depends_on:
      lens-rag-postgres-prod:
        condition: service_healthy
    environment:
      DB_HOST: lens-rag-postgres-prod
      DB_PORT: 5432
      DB_NAME: lens
      DB_USER: lens_user
      DB_PASSWORD: changeme
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      EMBEDDING_DIMS: ${EMBEDDING_DIMS:-1024}
      PGVECTOR_MAX_INDEXED_DIMS: ${PGVECTOR_MAX_INDEXED_DIMS:-2000}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-true}
      RERANKER_MODEL: ${RERANKER_MODEL:-bbjson/bge-reranker-base:latest}
      ROOT_PATH: ${ROOT_PATH:-}
      SERVE_FRONTEND: "true"
      FRONTEND_DIST_DIR: /app/frontend/dist
    volumes:
      - lens-rag-uploads-prod:/data/projects
      - ./frontend/dist:/app/frontend/dist:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"  # reach Ollama on host

volumes:
  lens-rag-postgres-data:
  lens-rag-postgres-prod-data:
  lens-rag-uploads:
  lens-rag-uploads-prod:
